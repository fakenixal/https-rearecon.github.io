<!DOCTYPE html>

<head>

<title>AEMM – Applied Economics Is More Than Money</title>

<style>
:root {
  --primary: #1f3b57;
  --accent: #2f80ed;
  --bg: #f7f9fc;
  --text: #1a1a1a;
  --muted: #6b7280;
  --border: #e5e7eb;
  --radius: 14px;
  --shadow: 0 8px 24px rgba(0,0,0,0.06);
}

body {
  margin: 0;
  font-family: "Plus Jakarta Sans", sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* NAVBAR */
header {
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 50;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}

.nav {
  max-width: 1200px;
  margin: auto;
  padding: 1rem 1.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

nav {
  display: flex;
  gap: 1.8rem;
}

nav a {
  text-decoration: none;
  color: var(--muted);
  font-size: 0.9rem;
}

nav a:hover {
  color: var(--primary);
}

/* HERO */
.hero {
  padding: 10rem 1.5rem 5rem;
  text-align: center;
  background: linear-gradient(135deg, #eaf2ff, #ffffff);
}

.hero h1 {
  font-size: 3rem;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 1rem;
}

.hero p {
  font-size: 1.2rem;
  color: var(--muted);
  max-width: 700px;
  margin: auto;
}

/* SECTION */
.section {
  max-width: 1200px;
  margin: auto;
  padding: 4rem 1.5rem;
}

.section-title {
  font-size: 1.6rem;
  font-weight: 600;
  color: var(--primary);
  margin-bottom: 1rem;
}

.section-sub {
  color: var(--muted);
  margin-bottom: 2rem;
}

/* GRID */
.grid {
  display: grid;
  gap: 1.6rem;
}

.grid-2 {
  grid-template-columns: repeat(2, 1fr);
}

@media (max-width: 768px) {
  .grid-2 {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<header>
